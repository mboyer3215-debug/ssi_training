<style>

.led-light{width:16px;height:16px;border-radius:50%;border:2px solid #333;display:inline-block;box-shadow:inset 0 0 5px rgba(0,0,0,0.5)}

.led-orange{background-color:#ff8800;box-shadow:0 0 10px #ff8800}

/* ===== SYSTÈME D'ACTIONS INTERACTIVES ===== */

/* Bouton attendu = clignotement doré */
@keyframes pulseRequired{
  0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,0.9);}
  50%{box-shadow:0 0 0 10px rgba(251,191,36,0);}
}
.action-required{
  animation:pulseRequired 0.7s ease-in-out infinite !important;
  border:3px solid #fbbf24 !important;
  position:relative;
  z-index:20;
}
/* Flèche au-dessus du bouton requis */
.action-required::before{
  content:'👆';
  position:absolute;
  top:-26px;
  left:50%;
  transform:translateX(-50%);
  font-size:18px;
  pointer-events:none;
  z-index:30;
  animation:bounceUp 0.5s ease infinite alternate;
}
@keyframes bounceUp{
  from{transform:translateX(-50%) translateY(0)}
  to{transform:translateX(-50%) translateY(-4px)}
}

/* Flash vert = bonne action */
@keyframes correctFlash{
  0%{filter:brightness(1) drop-shadow(0 0 12px #22c55e);}
  50%{filter:brightness(1.5) drop-shadow(0 0 20px #22c55e);}
  100%{filter:brightness(1) drop-shadow(0 0 0 transparent);}
}
.correct-action{animation:correctFlash 0.5s ease forwards !important;}

/* Secousse rouge = mauvaise action */
@keyframes wrongShake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-7px);}
  75%{transform:translateX(7px);}
}
.wrong-action{animation:wrongShake 0.35s ease !important;}

/* Bandeau instruction persistant */
.instruction-box{
  background:linear-gradient(135deg,#1e1b4b,#312e81);
  border:2px solid #fbbf24;
  border-radius:10px;
  padding:14px 16px;
  margin-bottom:12px;
}

/* Toast notification */
.toast-msg{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:10001;padding:10px 20px;border-radius:20px;
  font-weight:bold;font-size:14px;white-space:nowrap;
  color:white;box-shadow:0 4px 14px rgba(0,0,0,0.4);
  animation:slideDown 0.3s ease;
  max-width:90vw;white-space:normal;text-align:center;
}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ========================================================
   RENDU PRINCIPAL
======================================================== */
function renderApp(){
  document.getElementById('app').innerHTML = `
    <div class="min-h-screen p-3 max-w-4xl mx-auto">
      ${renderHeader()}
      ${renderScenarioBar()}
      ${renderInstruction()}
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        ${renderSDI()}
        ${renderSMSI()}
      </div>
    </div>
    ${renderModalScenarios()}
    ${renderModalSuccess()}
  `;
  updateLeds();
  // Si une étape panel est active, highlight immédiatement le bon bouton
  const step = getStep();
  if(step && step.type==='panel'){
    setTimeout(()=> highlightBtn(step.actions[currentSubIdx]?.id), 150);
  }
}

/* ─── HEADER ─── */
function renderHeader(){

      <div class="flex items-center gap-2">
        <span class="text-2xl">🔐</span>
        <div>

      </div>

        📋 Scénario
      </button>
    </div>`;
}

/* ─── BARRE SCÉNARIO + PROGRESSION ─── */
function renderScenarioBar(){
  if(!currentScenario) return `
    <div class="bg-gray-100 dark:bg-gray-800 rounded-xl p-4 mb-4 text-center text-gray-500 text-sm">
      Sélectionnez un scénario pour commencer
    </div>`;

  return `
    <div class="bg-gray-800 rounded-xl p-3 mb-3">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <span class="text-xl">${currentScenario.icon}</span>
          <div>
            <div class="text-white font-semibold text-sm">${currentScenario.title}</div>
            <div class="text-gray-400 text-xs">Étape ${currentStepIdx+1}/${currentScenario.steps.length} · Erreurs: ${nbErrors}</div>
          </div>
        </div>
        <button onclick="quitScenario()" class="text-gray-500 hover:text-red-400 text-xs transition-colors px-2">✕ Quitter</button>
      </div>
      <div class="flex gap-1">
        ${currentScenario.steps.map((_,i)=>{
          const cls = i<currentStepIdx?'bg-green-500':i===currentStepIdx?'bg-yellow-400 animate-pulse':'bg-gray-600';
          return `<div class="h-2 flex-1 rounded-full ${cls} transition-all"></div>`;
        }).join('')}
      </div>
    </div>`;
}

/* ─── BANDEAU INSTRUCTION PERSISTANT ─── */
function renderInstruction(){
  if(!currentScenario) return '';
  const step = getStep();
  if(!step) return '';

  const isInfo = step.type==='info';
  return `
    <div class="instruction-box mb-3">
      <div class="flex gap-3 items-start">
        <span class="text-2xl flex-shrink-0">${isInfo?'📋':'👆'}</span>
        <div class="flex-1">
          <div class="text-yellow-300 text-xs font-bold uppercase tracking-wide mb-1">
            ${isInfo ? 'Contexte du scénario' : 'Action requise sur le panneau SSI'}
          </div>
          <div class="text-white text-sm leading-relaxed">${step.instruction}</div>
          ${isInfo ? `
            <button onclick="confirmInfo()" class="mt-3 bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg font-semibold transition-all active:scale-95">
              ${step.btnLabel||'Commencer →'}
            </button>` : `
            <div class="mt-2 text-yellow-200 text-xs opacity-80">
              → ${step.actions[currentSubIdx]?.label || ''}
              ${step.requireSmsiNiv2 && P.smsiNiv!==2 ? '<span class="ml-2 text-red-300">⚠️ SMSI Niveau 2 requis d\'abord !</span>' : ''}

        </div>
      </div>
    </div>`;
}

/* ========================================================
   GESTION DES CLICS SUR LE PANNEAU
======================================================== */
function handleClick(btnId){
  if(!currentScenario) return;
  const step = getStep();
  if(!step || step.type==='info') return;

  const expected = step.actions[currentSubIdx];
  if(!expected) return;

  /* ── Bouton cliqué = bouton attendu ? ── */
  if(btnId === expected.id){

    /* ── Vérification Niveau 2 SMSI si requis ── */
    if(step.requireSmsiNiv2 && P.smsiNiv !== 2){
      flashWrong(btnId);
      toast('⚠️ Passez d\'abord le SMSI en Niveau 2 !','#dc2626');
      // Rediriger highlight vers la clé SMSI
      clearHighlights();
      highlightBtn('btn-smsi-niv2');
      // Mettre à jour instruction
      const instrEl = document.querySelector('.instruction-box .text-white.text-sm');
      if(instrEl) instrEl.textContent = '⚠️ Le SMSI doit être en Niveau 2 avant d\'acquitter le processus. Tournez la clé SMSI.';
      return;
    }

    /* ── Action correcte ! ── */
    flashCorrect(btnId);
    expected.exec();           // exécuter l'action sur le panneau
    currentSubIdx++;

    if(currentSubIdx < step.actions.length){
      // Il reste des sous-actions dans cette étape
      const next = step.actions[currentSubIdx];
      toast(`✅ ${expected.label}`, '#16a34a');
      setTimeout(()=>{ highlightBtn(next.id); refreshInstructions(); }, 500);
    } else {
      // Étape complète → passer à la suivante
      toast(`✅ ${expected.label} — Étape validée !`, '#16a34a');
      setTimeout(nextStep, 700);
    }

  } else {
    /* ── Mauvaise action ── */
    nbErrors++;
    flashWrong(btnId);
    toast(`❌ Ce n'est pas la bonne action → ${expected.label}`, '#dc2626');
    // Remettre le highlight sur le bon bouton
    setTimeout(()=>{ clearHighlights(); highlightBtn(expected.id); refreshScenarioBar(); }, 500);
  }
}

/* ── Confirmer l'étape INFO et démarrer les actions panel ── */
function confirmInfo(){
  const step = getStep();
  if(step.sdiScr) P.sdiScr = step.sdiScr;
  if(step.smsiScr) P.smsiScr = step.smsiScr;
  if(step.alarmOn) P.alarm = true;
  nextStep();
}

/* ── Passer à l'étape suivante ── */
function nextStep(){
  currentStepIdx++;
  currentSubIdx = 0;

  if(currentStepIdx >= currentScenario.steps.length){
    showSuccess(); return;
  }

  const step = getStep();
  if(step.sdiScr)  P.sdiScr  = step.sdiScr;
  if(step.smsiScr) P.smsiScr = step.smsiScr;

  renderApp();
  if(step.type==='panel' && step.actions.length>0){
    setTimeout(()=>highlightBtn(step.actions[0].id), 200);
  }
}

/* ========================================================
   FEEDBACK VISUEL
======================================================== */
function highlightBtn(id){
  clearHighlights();
  document.getElementById(id)?.classList.add('action-required');
}
function clearHighlights(){
  document.querySelectorAll('.action-required').forEach(el=>el.classList.remove('action-required'));
}
function flashCorrect(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.remove('action-required');
  el.classList.add('correct-action');
  setTimeout(()=>el.classList.remove('correct-action'),600);
}
function flashWrong(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.add('wrong-action');
  setTimeout(()=>el.classList.remove('wrong-action'),400);
}

let toastTm;
function toast(msg, bg='#1d4ed8'){
  document.getElementById('_toast')?.remove();
  const d=document.createElement('div');
  d.id='_toast'; d.className='toast-msg';
  d.style.background=bg; d.textContent=msg;
  document.body.appendChild(d);
  clearTimeout(toastTm);
  toastTm=setTimeout(()=>d.remove(),3200);
}

/* ========================================================
   MAJ PARTIELLE (sans re-render complet)
======================================================== */
function refresh(){
  // Mettre à jour les écrans sans tout re-rendre
  const set=(id,txt)=>{ const el=document.getElementById(id); if(el) el.textContent=txt||''; };
  set('sdi-l1',P.sdiScr[0]); set('sdi-l2',P.sdiScr[1]); set('sdi-l3',P.sdiScr[2]);
  set('smsi-l1',P.smsiScr[0]); set('smsi-l2',P.smsiScr[1]); set('smsi-l3',P.smsiScr[2]);
  updateLeds();
  // Clé SMSI
  document.getElementById('btn-smsi-niv2')?.classList.toggle('active', P.smsiNiv===2);
  document.getElementById('btn-sdi-niv2')?.classList.toggle('active', P.sdiNiv===2);
}

function refreshScenarioBar(){
  // Re-render uniquement la barre
  const el=document.querySelector('.bg-gray-800.rounded-xl.p-3.mb-3');
  if(el) el.outerHTML = renderScenarioBar();
}

function refreshInstructions(){
  const el=document.querySelector('.instruction-box');
  if(el) el.outerHTML = renderInstruction();
}

function updateLeds(){
  const cls=(on,blink=false)=>`led-light ${on?(blink?'led-red blink':'led-red'):'led-green'}`;
  document.getElementById('led-sdi-etat')?.setAttribute('class',cls(P.alarm,true));
  document.getElementById('led-smsi-alarm')?.setAttribute('class',cls(P.alarm,true));
  document.getElementById('led-smsi-niv')?.setAttribute('class',`led-light ${P.smsiNiv===2?'led-orange':'led-off'}`);
}

/* ========================================================
   SUCCÈS FINAL
======================================================== */
function showSuccess(){
  const elapsed=Math.round((Date.now()-startTime)/1000);
  const score=Math.max(0,100-nbErrors*10);
  P.sdiScr=['EXERCICE TERMINÉ','★ PROCÉDURE OK',''];
  P.smsiScr=['EXERCICE TERMINÉ','FÉLICITATIONS !',''];
  refresh();

  const modal=document.getElementById('modal-success');
  if(!modal){ renderApp(); return; }
  document.getElementById('suc-icon').textContent = score>=80?'🏆':score>=60?'👍':'📚';
  document.getElementById('suc-title').textContent = score>=80?'Excellent !':score>=60?'Bien joué !':'À réviser';
  document.getElementById('suc-details').textContent =
    `Scénario : ${currentScenario.title}\nScore : ${score}/100  ·  Durée : ${elapsed}s  ·  Erreurs : ${nbErrors}`;
  modal.classList.remove('hidden');
}

/* ========================================================
   NAVIGATION
======================================================== */
function getStep(){ return currentScenario?.steps[currentStepIdx]||null; }

function startScenario(id){
  closeModal();
  currentScenario=SCENARIOS[id];
  currentStepIdx=0; currentSubIdx=0; nbErrors=0;
  startTime=Date.now();
  P={ sdiNiv:1,smsiNiv:1,alarm:false,evac:false,
      sdiScr:['SYSTÈME EN VEILLE','TOUTES ZONES OK',''],
      smsiScr:['SYSTÈME EN VEILLE','TOUTES ZONES OK',''],
      zones:{ZC1:false,ZC2:false,ZC3:false,ZF1:false,ZF2:false,ZF3:false},
      ugaAcq:false,ugaFrc:false };
  renderApp();
}

function quitScenario(){ currentScenario=null; P.alarm=false; renderApp(); }
function retryScenario(){ document.getElementById('modal-success')?.classList.add('hidden'); if(currentScenario) startScenario(currentScenario.id); }
function openModal(){ if(!document.getElementById('modal-scenarios')) renderApp(); document.getElementById('modal-scenarios')?.classList.remove('hidden'); }
function closeModal(){ document.getElementById('modal-scenarios')?.classList.add('hidden'); }

/* ── INIT ── */
renderApp();
</script>
